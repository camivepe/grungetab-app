<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GrungeTab" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <title>GrungeTab</title>
</head>
<body class="dark">

<!-- ── PANTALLA: LOGIN ── -->
<div id="screen-login" class="screen">
  <div id="login-box">
    <div id="login-logo">GT</div>
    <h1>GrungeTab</h1>
    <p>Lector de tablaturas con scroll automático</p>
    <div id="login-btn-wrapper">
      <div id="g_id_onload"
           data-client_id="35167185978-9io4h4ktqqoahag0o04mi6gr6fpaq2np.apps.googleusercontent.com"
           data-callback="onGoogleLogin"
           data-auto_select="true">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="filled_black"
           data-text="signin_with"
           data-shape="rectangular"
           data-logo_alignment="left">
      </div>
    </div>
  </div>
</div>

<!-- ── PANTALLA: LISTA DE DOCS ── -->
<div id="screen-list" class="screen hidden">
  <div id="list-header">
    <span id="list-title">GrungeTab</span>
    <div id="list-header-buttons">
      <button id="btn-list-theme" title="Toggle tema">☀️</button>
      <button id="btn-logout" title="Cerrar sesión">⏏</button>
    </div>
  </div>

  <div id="search-wrapper">
    <input
            type="search"
            id="search-input"
            placeholder="Buscar tablatura..."
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
    />
  </div>

  <div id="doc-list">
    <div id="list-loading">Cargando documentos...</div>
  </div>
</div>

<!-- ── PANTALLA: LECTOR ── -->
<div id="screen-reader" class="screen hidden">

  <!-- Controls overlay -->
  <div id="controls">
    <div id="controls-top">
      <button id="btn-back" title="Volver a la lista">←</button>
      <span id="song-title">—</span>
      <div id="top-buttons">
        <button id="btn-theme" title="Toggle tema">☀️</button>
        <button id="btn-top" title="Volver al inicio">⬆</button>
      </div>
    </div>

    <div id="controls-bottom">
      <button id="btn-play">▶ Reproducir</button>
      <div id="speed-control">
        <span>🐢</span>
        <input type="range" id="speed-slider" min="1" max="4" value="2" step="1" />
        <span>🐇</span>
        <span id="speed-label">Normal</span>
      </div>
    </div>
  </div>

  <!-- Contenido del documento -->
  <div id="tab-container">
    <div id="tab-content"></div>
  </div>

</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="app.js"></script>
</body>
</html>
