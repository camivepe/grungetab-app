<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://accounts.google.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://accounts.google.com; img-src 'self' data: blob: https://*.googleusercontent.com https://*.google.com; connect-src 'self' https://oauth2.googleapis.com https://docs.googleapis.com https://www.googleapis.com https://accounts.google.com https://cdnjs.cloudflare.com; frame-src https://accounts.google.com; worker-src 'self' blob: https://cdnjs.cloudflare.com; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GrungeTab" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="style.css" />
  <title>GrungeTab</title>
  <script src="config.js"></script>
</head>
<body class="dark">

<!-- Pill global de modo offline (oculto por defecto, visible cuando navigator.onLine === false) -->
<div id="offline-pill" class="hidden">Sin conexión</div>

<!-- ── PANTALLA: LOGIN ── -->
<div id="screen-login" class="screen hidden">
  <div id="login-box">
    <div id="login-logo">GT</div>
    <h1>GrungeTab</h1>
    <p>Lector de tablaturas con scroll automático</p>
    <div id="login-btn-wrapper">
      <div id="g_id_onload"
           data-client_id="__GOOGLE_CLIENT_ID__"
           data-callback="onGoogleLogin"
           data-auto_select="true">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="filled_black"
           data-text="signin_with"
           data-shape="rectangular"
           data-logo_alignment="left">
      </div>
    </div>
  </div>
</div>

<!-- ── PANTALLA: LISTA DE DOCS ── -->
<div id="screen-list" class="screen hidden">
  <div id="list-header">
    <button id="btn-list-back" class="hidden" title="Volver">←</button>
    <span id="list-title">GrungeTab</span>
    <div id="list-header-buttons">
      <button id="btn-setlist" title="Ver setlist">🎼<span id="setlist-badge" class="hidden">0</span></button>
      <button id="btn-install" class="hidden" title="Instalar app">📲</button>
      <button id="btn-list-theme" title="Toggle tema">☀️</button>
      <button id="btn-logout" title="Cerrar sesión">⏏</button>
    </div>
  </div>

  <div id="setlist-panel" class="hidden">
    <div id="setlist-panel-header">
      <span>Setlist</span>
      <button id="btn-setlist-clear" title="Vaciar setlist">🚮 Vaciar</button>
      <button id="btn-setlist-close" title="Cerrar">✕</button>
    </div>
    <div id="setlist-items"></div>
  </div>

  <div id="search-wrapper">
    <input
            type="search"
            id="search-input"
            placeholder="Buscar tablatura..."
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
    />
  </div>

  <div id="doc-list">
    <div id="list-loading">Cargando documentos...</div>
  </div>
</div>

<!-- ── PANTALLA: LECTOR ── -->
<div id="screen-reader" class="screen hidden">

  <!-- Controls overlay -->
  <div id="controls">
    <div id="controls-top">
      <button id="btn-back" title="Volver a la lista">←</button>
      <span id="song-title">—</span>
      <span id="file-type-badge"></span>
      <div id="top-buttons">
        <button id="btn-reload" title="Recargar documento">↺</button>
        <button id="btn-setlist-prev" class="hidden" title="Anterior en setlist">🎵◀</button>
        <button id="btn-setlist-next" class="hidden" title="Siguiente en setlist">🎵▶</button>
        <button id="btn-prev-section" class="hidden" title="Sección anterior">⏮</button>
        <button id="btn-next-section" class="hidden" title="Siguiente sección">⏭</button>
        <button id="btn-wrap" title="Ajuste de línea">↵</button>
        <button id="btn-theme" title="Toggle tema">☀️</button>
        <button id="btn-top" title="Volver al inicio">⬆</button>
      </div>
    </div>

    <div id="controls-bottom">
      <div id="bottom-main">
        <button id="btn-play">▶ Reproducir</button>
        <button id="btn-settings" title="Ajustes">⚙</button>
      </div>
      <div id="settings-panel" class="hidden">
        <div id="speed-control">
          <span class="ctrl-icon">🐢</span>
          <button id="btn-speed-down" title="Reducir velocidad">−</button>
          <span id="speed-label">Normal</span>
          <button id="btn-speed-up" title="Aumentar velocidad">+</button>
          <span class="ctrl-icon">🐇</span>
        </div>
        <div id="view-options">
          <span class="ctrl-icon">🔤</span>
          <button id="btn-font-down" title="Reducir fuente">−</button>
          <span id="font-label">M</span>
          <button id="btn-font-up" title="Aumentar fuente">+</button>
        </div>
        <div id="zoom-control" class="hidden">
          <span class="ctrl-icon">🔍</span>
          <button id="btn-zoom-out" title="Alejar">−</button>
          <span id="zoom-label">100%</span>
          <button id="btn-zoom-in" title="Acercar">+</button>
        </div>
        <div id="invert-control" class="hidden">
          <button id="btn-invert-imgs">🖼 Invertir imágenes: ON</button>
        </div>
        <div id="cache-control">
          <button id="btn-clear-cache" title="Limpiar caché offline">🧹 Limpiar caché offline</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Contenido del documento -->
  <div id="tab-container">
    <div id="tab-content"></div>
  </div>

</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="app.js"></script>
</body>
</html>
