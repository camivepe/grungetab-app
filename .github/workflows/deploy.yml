name: Deploy GrungeTab to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Inject secrets
        run: |
          sed -i "s|__GOOGLE_CLIENT_ID__|${{ secrets.GOOGLE_CLIENT_ID }}|g" index.html config.js
          sed -i "s|__ALLOWED_EMAIL__|${{ secrets.ALLOWED_EMAIL }}|g" config.js
          sed -i "s|__TABS_FOLDER_ID__|${{ secrets.TABS_FOLDER_ID }}|g" config.js
          sed -i "s|__CACHE_VERSION__|$(git rev-parse --short HEAD)|g" sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4